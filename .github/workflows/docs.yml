name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs-src/mkdocs/**'
      - 'docs-src/sphinx/**'
      - 'docs/assets/diagrams/**'
      - '.github/workflows/docs.yml'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install mkdocs mkdocs-material pymdown-extensions sphinx sphinx-rtd-theme

      - name: Build MkDocs (User Guide)
        run: |
          mkdocs build -f docs-src/mkdocs/mkdocs.yml -d site

      - name: Build Sphinx (API Reference)
        run: |
          sphinx-build -b html docs-src/sphinx/source site/sphinx

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages