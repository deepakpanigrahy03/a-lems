site_name: A-LEMS Documentation
site_description: Agentic LLM Energy Measurement System
site_url: http://129.153.71.47:8502
docs_dir: docs-src
site_dir: docs

theme:
  name: material
  palette:
    scheme: slate
    primary: green
    accent: cyan
  font:
    code: IBM Plex Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.md
  - Architecture:
    - Overview: architecture/overview.md
    - Agent: architecture/agent.md
    - Server: architecture/server.md
    - Schema: architecture/schema.md
    - Data Flow: architecture/data-flow.md
  - Setup:
    - Install: setup/install.md
  - Reference:
    - API: reference/api.md
    - Schema Diff: reference/schema-diff.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search

extra:
  version: "1.0.0"
